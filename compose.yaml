services:
  alertmanager:
    image: quay.io/prometheus/alertmanager:v0.32.1
    configs:
      - source: alertmanager
        target: /etc/alertmanager/alertmanager.yml
    ports:
      - 127.0.0.1:9093:9093
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:9093/-/ready"]
      interval: 5s
      timeout: 3s
      retries: 10

  alertmanager-mcp:
    build: .
    environment:
      ALERTMANAGER_URL: http://alertmanager:9093
    ports:
      - 127.0.0.1:8000:8000
      - 127.0.0.1:8001:8001
    depends_on:
      alertmanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "alertmanager_mcp.healthcheck"]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 5s

configs:
  alertmanager:
    content: |
      route:
        receiver: noop

      receivers:
        - name: noop
